# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g history-limit 50000

# --- Prefix: Ctrl+A ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload Config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Vim-style pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Splits (stay in current dir) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Resize panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy Mode (vi) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ===========================================================
# Plugin Manager
# ===========================================================
set -g @plugin 'tmux-plugins/tpm'

# Which-key popup
set -g @plugin 'alexwforsythe/tmux-which-key'

# Monokai Pro theme
set -g @plugin 'maxpetretta/tmux-monokai-pro'

# --- Monokai Pro config (renamed from @dracula-*) ---
set -g @monokai-show-powerline true
set -g @monokai-show-flags true
set -g @monokai-show-left-icon session
set -g @monokai-plugins "cpu-usage ram-usage git time"
set -g @monokai-refresh-rate 5
set -g @monokai-day-month true
set -g @monokai-military-time true

# Initialize tpm — must be the LAST line
run '~/.tmux/plugins/tpm/tpm'
