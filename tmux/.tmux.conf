# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g history-limit 50000

# --- Prefix: Ctrl+A ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload Config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Vim-style pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Splits (stay in current dir) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -v "#{pane_current_path}"
unbind '"'
unbind %

# --- Resize panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy Mode (vi) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ===========================================================
# Catppucchin Mocha theme
# ===========================================================
base="#1e1e2e"
mantle="#181825"
crust="#11111b"
surface0="#313244"
surface1="#45475a"
overlay0="#6c7086"
text="#cdd6f4"
subtext0="#a6adc8"
lavender="#b4befe"
blue="#89b4fa"
sapphire="#74c7ec"
teal="#94e2d5"
green="#a6e3a1"
yellow="#f9e2af"
peach="#fab387"
mauve="#cba6f7"
red="#f38ba8"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#181825,fg=#cdd6f4"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#b4befe,fg=#1e1e2e,bold] #S #[bg=#181825,fg=#b4befe]"

# Right: host + time (mirrors p10k right prompt style)
set -g status-right-length 80
set -g status-right "#[fg=#45475a]#[bg=#45475a,fg=#a6adc8] #H #[fg=#313244]#[bg=#313244,fg=#94e2d5] %H:%M #[fg=#b4befe]#[bg=#b4befe,fg=#1e1e2e,bold] %d %b "

# Window tabs
set -g window-status-style "bg=#181825,fg=#6c7086"
set -g window-status-format " #I #W "
set -g window-status-current-style "bg=#313244,fg=#b4befe,bold"
set -g window-status-current-format "#[fg=#181825]#[bg=#313244,fg=#b4befe] #I #W #[fg=#313244,bg=#181825]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#b4befe"

# Messages
set -g message-style "bg=#313244,fg=#f9e2af"
set -g message-command-style "bg=#313244,fg=#94e2d5"

# Copy mode highlight
set -g mode-style "bg=#45475a,fg=#cdd6f4"
